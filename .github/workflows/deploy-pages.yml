name: Deploy project and Storybook

on:
  workflow_dispatch:
    inputs:
      project:
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect project
        id: detect
        run: |
          PROJECT=$(find projects -mindepth 1 -maxdepth 1 -type d | head -n1 | cut -d/ -f2)

          if [ -z "$PROJECT" ]; then
            echo "No project found in projects/"
            exit 1
          fi

          echo "Detected project: $PROJECT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          cd projects/${{ steps.detect.outputs.project }}
          npm install

      - name: Build app
        run: |
          cd projects/${{ steps.detect.outputs.project }}
          npm run build

      - name: Build Storybook
        run: |
          cd projects/${{ steps.detect.outputs.project }}
          npm run build-storybook -- --output-dir storybook-static

      - name: Prepare Pages output
        run: |
          PROJECT="${{ steps.detect.outputs.project }}"

          mkdir -p pages-output/$PROJECT

          cp -R projects/$PROJECT/dist/* pages-output/$PROJECT/

          mkdir -p pages-output/$PROJECT/storybook
          cp -R projects/$PROJECT/storybook-static/* pages-output/$PROJECT/storybook/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4